<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Psi — Editor Visual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --b1:#2A1208;--b2:#3D1A0F;--b3:#5C2A1A;--b4:#6B3A2A;--b5:#7D4A35;
  --b6:#8B5E52;--b7:#9E7060;--b8:#B08070;--b9:#C4957A;--b10:#D4A898;
  --b11:#E8D5C4;--b12:#F0E6DC;--b13:#F5EDE4;--b14:#FFF8F3;
  --acc:#D4A56A;--acc2:#C4957A;
  --dark:#1A0A04;--surface:#221008;--panel:#2E1510;--card:#3A1C10;
  --border:rgba(196,149,122,.18);--border2:rgba(196,149,122,.35);
  --text:#F5EDE4;--textm:#C4957A;--texts:#8B5E52;
  --radius:12px;--radius-lg:18px;
  --shadow:0 8px 40px rgba(0,0,0,.5);
}
html,body{height:100%;overflow:hidden;background:var(--dark);font-family:'DM Sans',sans-serif;color:var(--text);}

/* LAYOUT */
#app{display:grid;grid-template-rows:52px 1fr;height:100vh;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
#main{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 52px);overflow:hidden;}

/* TOPBAR */
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--b9);letter-spacing:.06em;margin-right:auto;}
.logo span{font-style:italic;color:var(--acc);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.tbtn{padding:6px 14px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--textm);transition:all .2s;}
.tbtn:hover{background:var(--card);color:var(--text);}
.tbtn.primary{background:var(--b4);border-color:var(--b4);color:#fff;}
.tbtn.primary:hover{background:var(--b5);}
.size-selector{display:flex;gap:4px;align-items:center;}
.size-btn{padding:4px 8px;border-radius:6px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--texts);cursor:pointer;transition:all .2s;}
.size-btn.active,.size-btn:hover{background:var(--b4);color:#fff;border-color:var(--b4);}

/* LEFT PANEL */
#left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);}
.ptab{flex:1;padding:10px 4px;font-size:10px;text-align:center;cursor:pointer;color:var(--texts);border:none;background:transparent;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;font-family:'DM Sans',sans-serif;}
.ptab.active{color:var(--b9);border-bottom:2px solid var(--b4);}
.panel-body{flex:1;overflow-y:auto;padding:16px;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px;}
.section-title{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--texts);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ELEMENTS / SHAPES */
.elements-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px;}
.el-btn{aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:var(--panel);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .2s;font-size:18px;}
.el-btn:hover{border-color:var(--b4);background:var(--card);}
.el-btn span{font-size:9px;color:var(--texts);font-family:'DM Sans',sans-serif;}

/* TEMPLATES */
.tpl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.tpl-card{aspect-ratio:.75;border-radius:10px;border:1px solid var(--border);overflow:hidden;cursor:pointer;position:relative;transition:all .2s;}
.tpl-card:hover{border-color:var(--b4);transform:translateY(-2px);}
.tpl-card canvas{width:100%;height:100%;display:block;}
.tpl-card .tpl-name{position:absolute;bottom:0;left:0;right:0;padding:6px;font-size:9px;text-align:center;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;letter-spacing:.05em;text-transform:uppercase;}

/* STICKERS / TEXT PRESETS */
.sticker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.sticker-btn{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--panel);cursor:pointer;font-size:11px;text-align:center;color:var(--textm);transition:all .2s;font-family:'Cormorant Garamond',serif;font-style:italic;}
.sticker-btn:hover{border-color:var(--b4);background:var(--card);}

/* CANVAS AREA */
#canvas-area{background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
#canvas-wrapper{position:relative;box-shadow:var(--shadow);}
#mainCanvas{display:block;cursor:crosshair;}
.canvas-toolbar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:100px;padding:6px 10px;display:flex;gap:4px;align-items:center;}
.tool-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--textm);font-size:16px;transition:all .2s;}
.tool-btn:hover{background:var(--card);color:var(--text);}
.tool-btn.active{background:var(--b4);color:#fff;}
.tool-sep{width:1px;height:24px;background:var(--border);margin:0 2px;}
.zoom-info{font-size:10px;color:var(--texts);padding:0 8px;}

/* RIGHT PANEL */
#right-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:16px;}
#right-panel::-webkit-scrollbar{width:3px;}
#right-panel::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px;}

/* COLOR PANEL */
.palette-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 3px var(--b4);}
.custom-color-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.custom-color-row input[type=color]{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--panel);cursor:pointer;padding:2px;}
.custom-color-row span{font-size:11px;color:var(--textm);}

/* SLIDERS */
.prop-row{margin-bottom:12px;}
.prop-row label{font-size:10px;color:var(--texts);display:block;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
.prop-row input[type=range]{width:100%;accent-color:var(--b4);}
.prop-val{font-size:10px;color:var(--textm);float:right;}

/* TEXT PROPERTIES */
.font-select{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:8px;cursor:pointer;}
.align-row{display:flex;gap:4px;margin-bottom:10px;}
.align-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--texts);cursor:pointer;font-size:13px;transition:all .2s;}
.align-btn.active,.align-btn:hover{background:var(--b4);border-color:var(--b4);color:#fff;}
.style-row{display:flex;gap:4px;margin-bottom:12px;}
.style-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--texts);cursor:pointer;font-size:11px;transition:all .2s;}
.style-btn.active{background:var(--b4);border-color:var(--b4);color:#fff;}

/* TEXT INPUT */
.text-area-input{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s;}
.text-area-input:focus{border-color:var(--b4);}
.add-btn{width:100%;padding:10px;border-radius:10px;border:none;background:var(--b4);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;transition:all .2s;letter-spacing:.03em;}
.add-btn:hover{background:var(--b5);}

/* LAYERS */
.layer-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--panel);margin-bottom:6px;cursor:pointer;transition:all .2s;}
.layer-item:hover{border-color:var(--b4);}
.layer-item.selected{border-color:var(--b4);background:var(--card);}
.layer-thumb{width:28px;height:28px;border-radius:6px;background:var(--b4);flex-shrink:0;}
.layer-name{font-size:11px;color:var(--textm);flex:1;}
.layer-actions{display:flex;gap:4px;}
.layer-act{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--texts);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.layer-act:hover{background:var(--b3);color:var(--text);}

/* EXPORT */
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.exp-card{padding:14px 10px;border-radius:12px;border:1px solid var(--border);background:var(--panel);cursor:pointer;text-align:center;transition:all .2s;}
.exp-card:hover{border-color:var(--b4);background:var(--card);}
.exp-card .exp-icon{font-size:22px;margin-bottom:6px;}
.exp-card .exp-label{font-size:10px;color:var(--textm);letter-spacing:.04em;text-transform:uppercase;}
.exp-card .exp-sub{font-size:9px;color:var(--texts);margin-top:2px;}

/* FILTERS */
.filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.filter-card{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.filter-card:hover,.filter-card.active{border-color:var(--b4);}
.filter-card canvas{width:100%;display:block;}
.filter-card .filter-name{font-size:8px;text-align:center;padding:3px;background:var(--panel);color:var(--textm);}

/* TABS in right panel */
.rpanel-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.rptab{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--texts);font-size:10px;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .2s;font-family:'DM Sans',sans-serif;}
.rptab.active{background:var(--b4);border-color:var(--b4);color:#fff;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0;}
.sub-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--texts);margin-bottom:8px;}

/* GRADIENT */
.gradient-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.grad-pill{width:48px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.grad-pill.active,.grad-pill:hover{border-color:#fff;}

/* OVERLAY on canvas for selected object */
#selection-overlay{position:absolute;pointer-events:none;border:2px dashed rgba(196,149,122,.8);border-radius:4px;display:none;}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">Studio<span>Psi</span></div>
  <div class="size-selector">
    <button class="size-btn active" onclick="setCanvasSize(1080,1080,this)">Feed</button>
    <button class="size-btn" onclick="setCanvasSize(1080,1350,this)">Retrato</button>
    <button class="size-btn" onclick="setCanvasSize(1080,1920,this)">Story</button>
    <button class="size-btn" onclick="setCanvasSize(1080,566,this)">Banner</button>
  </div>
  <div class="topbar-actions">
    <button class="tbtn" onclick="undo()">↩ Desfazer</button>
    <button class="tbtn" onclick="redo()">Refazer ↪</button>
    <button class="tbtn" onclick="clearAll()">Limpar</button>
    <button class="tbtn primary" onclick="showExport()">⬇ Exportar</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="leftTab('templates',this)">Posts</button>
      <button class="ptab" onclick="leftTab('elements',this)">Formas</button>
      <button class="ptab" onclick="leftTab('stickers',this)">Texto+</button>
    </div>
    <div class="panel-body" id="left-body"></div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="mainCanvas"></canvas>
      <div id="selection-overlay"></div>
    </div>
    <div class="canvas-toolbar">
      <button class="tool-btn active" title="Selecionar" onclick="setTool('select',this)">⬡</button>
      <button class="tool-btn" title="Texto" onclick="setTool('text',this)">T</button>
      <button class="tool-btn" title="Pincel" onclick="setTool('brush',this)">✏</button>
      <button class="tool-btn" title="Borracha" onclick="setTool('eraser',this)">◻</button>
      <button class="tool-btn" title="Forma" onclick="setTool('shape',this)">⬟</button>
      <button class="tool-btn" title="Preencher" onclick="setTool('fill',this)">⬤</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="Zoom -" onclick="zoom(-0.1)">−</button>
      <span class="zoom-info" id="zoomLabel">100%</span>
      <button class="tool-btn" title="Zoom +" onclick="zoom(0.1)">+</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="rpanel-tabs">
      <button class="rptab active" onclick="rightTab('cor',this)">Cor</button>
      <button class="rptab" onclick="rightTab('texto',this)">Texto</button>
      <button class="rptab" onclick="rightTab('filtros',this)">Filtros</button>
      <button class="rptab" onclick="rightTab('camadas',this)">Camadas</button>
      <button class="rptab" onclick="rightTab('exportar',this)">Exportar</button>
    </div>
    <div id="right-body"></div>
  </div>

</div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let tool = 'select';
let currentColor = '#6B3A2A';
let brushSize = 8;
let opacity = 1;
let currentFont = 'Cormorant Garamond, serif';
let fontSize = 48;
let textAlign = 'center';
let fontWeight = '400';
let fontStyle = 'normal';
let currentFilter = 'none';
let zoom = 1;
let canvasW = 1080, canvasH = 1080;
let displayW, displayH;
let drawing = false;
let lastX = 0, lastY = 0;
let history = [], histIdx = -1;
let layers = [];
let selectedLayer = null;
let shapeMode = 'rect';
let shapeStart = null;
let shapeSnap = null;
let currentGradient = null;

const palette = [
  '#2A1208','#3D1A0F','#5C2A1A','#6B3A2A','#7D4A35',
  '#8B5E52','#9E7060','#B08070','#C4957A','#D4A898',
  '#E8D5C4','#F0E6DC','#F5EDE4','#FFF8F3','#D4A56A',
  '#B8860B','#8B7355','#A0522D','#CD853F','#DEB887',
  '#1A0A04','#fff','#000','#F08080','#BC8F8F'
];

const gradients = [
  {name:'Terracota',stops:['#6B3A2A','#C4957A']},
  {name:'Marfim',stops:['#F5EDE4','#D4A898']},
  {name:'Cobre',stops:['#3D1A0F','#D4A56A']},
  {name:'Névoa',stops:['#E8D5C4','#8B5E52']},
  {name:'Noite',stops:['#1A0A04','#6B3A2A']},
  {name:'Ouro',stops:['#B8860B','#FFF8F3']},
];

const fonts = [
  {label:'Cormorant Garamond',value:'Cormorant Garamond, serif'},
  {label:'Playfair Display',value:'Playfair Display, serif'},
  {label:'Lora',value:'Lora, serif'},
  {label:'Cinzel',value:'Cinzel, serif'},
  {label:'Raleway',value:'Raleway, sans-serif'},
  {label:'DM Sans',value:'DM Sans, sans-serif'},
];

const templates = [
  {name:'Citação',fn:drawTplQuote},
  {name:'Dica Mental',fn:drawTplTip},
  {name:'Sobre Mim',fn:drawTplAbout},
  {name:'Chamada',fn:drawTplCta},
  {name:'Fundo Linho',fn:drawTplLinen},
  {name:'Aquarela',fn:drawTplWater},
];

const stickers = [
  {label:'"Sua frase aqui"',text:'"Sua frase aqui"',font:'Cormorant Garamond, serif',size:52,style:'italic'},
  {label:'Título Editorial',text:'SAÚDE MENTAL',font:'Cinzel, serif',size:36,style:'normal'},
  {label:'Subtítulo',text:'por @suapsicologia',font:'Raleway, sans-serif',size:22,style:'normal'},
  {label:'Citação longa',text:'"Cuidar de si é o primeiro passo para cuidar do outro."',font:'Lora, serif',size:26,style:'italic'},
  {label:'Hashtag',text:'#PsicologiaParaMulheres',font:'DM Sans, sans-serif',size:18,style:'normal'},
  {label:'CRP',text:'CRP 00/000000',font:'Raleway, sans-serif',size:16,style:'normal'},
];

// ─── INIT ─────────────────────────────────────────────
function initCanvas(){
  setCanvasSize(1080,1080,document.querySelector('.size-btn.active'));
  saveHistory();
  buildLeftPanel('templates');
  buildRightPanel('cor');
}

function setCanvasSize(w,h,btn){
  canvasW=w; canvasH=h;
  const area = document.getElementById('canvas-area');
  const maxW = area.clientWidth - 40;
  const maxH = area.clientHeight - 80;
  const scaleW = maxW/w, scaleH = maxH/h;
  const scale = Math.min(scaleW, scaleH, 1);
  displayW = Math.round(w*scale);
  displayH = Math.round(h*scale);
  canvas.width = w; canvas.height = h;
  canvas.style.width = displayW+'px';
  canvas.style.height = displayH+'px';
  document.getElementById('canvas-wrapper').style.width = displayW+'px';
  document.getElementById('canvas-wrapper').style.height = displayH+'px';
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ctx.fillStyle='#F5EDE4'; ctx.fillRect(0,0,w,h);
}

// ─── HISTORY ──────────────────────────────────────────
function saveHistory(){
  if(histIdx<history.length-1) history=history.slice(0,histIdx+1);
  history.push(canvas.toDataURL());
  histIdx++;
  if(history.length>50) history.shift();
}
function undo(){if(histIdx>0){histIdx--;restoreHistory();}}
function redo(){if(histIdx<history.length-1){histIdx++;restoreHistory();}}
function restoreHistory(){
  const img=new Image();img.onload=()=>{ctx.clearRect(0,0,canvasW,canvasH);ctx.drawImage(img,0,0);};
  img.src=history[histIdx];
}

// ─── TOOL ─────────────────────────────────────────────
function setTool(t,btn){
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const cursors={select:'default',text:'text',brush:'crosshair',eraser:'cell',shape:'crosshair',fill:'cell'};
  canvas.style.cursor=cursors[t]||'default';
}

// ─── CANVAS EVENTS ────────────────────────────────────
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvasW/displayW, scaleY=canvasH/displayH;
  return {x:(e.clientX-r.left)*scaleX, y:(e.clientY-r.top)*scaleY};
}

function onDown(e){
  const p=getCanvasPos(e);
  drawing=true; lastX=p.x; lastY=p.y;
  if(tool==='fill'){floodFill(Math.round(p.x),Math.round(p.y));saveHistory();drawing=false;return;}
  if(tool==='text'){promptText(p.x,p.y);drawing=false;return;}
  if(tool==='shape'){shapeStart={x:p.x,y:p.y};shapeSnap=canvas.toDataURL();return;}
  if(tool==='brush'||tool==='eraser'){
    ctx.globalAlpha=opacity;
    ctx.strokeStyle=tool==='eraser'?'#F5EDE4':currentColor;
    ctx.lineWidth=tool==='eraser'?brushSize*3:brushSize;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(p.x,p.y);
  }
}
function onMove(e){
  if(!drawing)return;
  const p=getCanvasPos(e);
  if(tool==='brush'||tool==='eraser'){ctx.lineTo(p.x,p.y);ctx.stroke();}
  if(tool==='shape'&&shapeStart){
    const img=new Image();img.onload=()=>{
      ctx.clearRect(0,0,canvasW,canvasH);ctx.drawImage(img,0,0);
      ctx.globalAlpha=opacity;ctx.strokeStyle=currentColor;ctx.fillStyle=currentColor;ctx.lineWidth=brushSize;
      drawShape(shapeStart.x,shapeStart.y,p.x,p.y);
    };img.src=shapeSnap;
  }
  lastX=p.x;lastY=p.y;
}
function onUp(e){
  if(drawing){
    drawing=false;ctx.globalAlpha=1;
    if(tool!=='fill'&&tool!=='text')saveHistory();
  }
  shapeStart=null;shapeSnap=null;
}

function drawShape(x1,y1,x2,y2){
  const w=x2-x1,h=y2-y1;
  ctx.beginPath();
  if(shapeMode==='rect'){ctx.rect(x1,y1,w,h);}
  else if(shapeMode==='circle'){ctx.ellipse(x1+w/2,y1+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);}
  else if(shapeMode==='line'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);}
  else if(shapeMode==='triangle'){ctx.moveTo(x1+w/2,y1);ctx.lineTo(x2,y2);ctx.lineTo(x1,y2);ctx.closePath();}
  ctx.stroke();
}

function applyText(txt,x,y){
  if(!txt.trim())return;

  ctx.fillStyle=currentColor;
  ctx.font=`${fontStyle} ${fontWeight} ${fontSize}px ${currentFont}`;
  ctx.textAlign=textAlign;

  const words=txt.split('\n');
  words.forEach((line,i)=>{ctx.fillText(line,x,y+i*(fontSize*1.3));});
  ctx.globalAlpha=1;
  saveHistory();
}

// ─── FILL ─────────────────────────────────────────────
function floodFill(sx,sy){
  const imgData=ctx.getImageData(0,0,canvasW,canvasH);
  const d=imgData.data;
  const idx=(x,y)=>(y*canvasW+x)*4;
  const ti=idx(sx,sy);
  const tr=d[ti],tg=d[ti+1],tb=d[ti+2];
  const c=hexToRgb(currentColor);
  if(tr===c.r&&tg===c.g&&tb===c.b)return;
  const stack=[[sx,sy]];
  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=canvasW||y<0||y>=canvasH)continue;
    const i=idx(x,y);
    if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb)continue;
    d[i]=c.r;d[i+1]=c.g;d[i+2]=c.b;d[i+3]=Math.round(opacity*255);
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}

// ─── ZOOM ─────────────────────────────────────────────
function zoom(delta){
  const area=document.getElementById('canvas-area');
  const maxW=area.clientWidth-40,maxH=area.clientHeight-80;
  const baseScale=Math.min(maxW/canvasW,maxH/canvasH,1);
  const scales=[0.25,0.33,0.5,0.67,0.75,1,1.25,1.5,2];
  const cur=displayW/(canvasW*baseScale);
  let ni=scales.findIndex(s=>s>=cur)+(delta>0?0:-1);
  ni=Math.max(0,Math.min(scales.length-1,ni+(delta>0?1:-1)));
  const ns=scales[ni];
  displayW=Math.round(canvasW*baseScale*ns);
  displayH=Math.round(canvasH*baseScale*ns);
  canvas.style.width=displayW+'px';
  canvas.style.height=displayH+'px';
  document.getElementById('canvas-wrapper').style.width=displayW+'px';
  document.getElementById('canvas-wrapper').style.height=displayH+'px';
  document.getElementById('zoomLabel').textContent=Math.round(ns*100)+'%';
}

// ─── FILTERS ──────────────────────────────────────────
function applyFilter(name){
  currentFilter=name;
  const imgData=ctx.getImageData(0,0,canvasW,canvasH);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    if(name==='sepia'){d[i]=Math.min(255,r*.393+g*.769+b*.189);d[i+1]=Math.min(255,r*.349+g*.686+b*.168);d[i+2]=Math.min(255,r*.272+g*.534+b*.131);}
    else if(name==='warm'){d[i]=Math.min(255,r*1.1);d[i+1]=Math.min(255,g*1.02);d[i+2]=Math.max(0,b*.9);}
    else if(name==='mocha'){d[i]=Math.min(255,r*.8+50);d[i+1]=Math.min(255,g*.7+30);d[i+2]=Math.max(0,b*.6+10);}
    else if(name==='fade'){d[i]=r*.8+40;d[i+1]=g*.8+40;d[i+2]=b*.8+40;}
    else if(name==='contrast'){const f=259*(100+70)/(255*(259-70));d[i]=Math.min(255,Math.max(0,f*(r-128)+128));d[i+1]=Math.min(255,Math.max(0,f*(g-128)+128));d[i+2]=Math.min(255,Math.max(0,f*(b-128)+128));}
  }
  ctx.putImageData(imgData,0,0);
  saveHistory();
}

function filterPreview(c,name){
  const imgData=ctx.getImageData(0,0,Math.min(canvasW,100),Math.min(canvasH,100));
  const d=new Uint8ClampedArray(imgData.data);
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    if(name==='sepia'){d[i]=Math.min(255,r*.393+g*.769+b*.189);d[i+1]=Math.min(255,r*.349+g*.686+b*.168);d[i+2]=Math.min(255,r*.272+g*.534+b*.131);}
    else if(name==='warm'){d[i]=Math.min(255,r*1.1);d[i+1]=Math.min(255,g*1.02);d[i+2]=Math.max(0,b*.9);}
    else if(name==='mocha'){d[i]=Math.min(255,r*.8+50);d[i+1]=Math.min(255,g*.7+30);d[i+2]=Math.max(0,b*.6+10);}
    else if(name==='fade'){d[i]=r*.8+40;d[i+1]=g*.8+40;d[i+2]=b*.8+40;}
  }
  c.putImageData(new ImageData(d,imgData.width,imgData.height),0,0);
}

}

function wrapText(c,text,x,y,maxW,lineH){
  const lines=text.split('\n');
  lines.forEach((line,li)=>{
    const words=line.split(' ');let l='';
    const rows=[];
    words.forEach(w=>{const t=l?l+' '+w:w;if(c.measureText(t).width>maxW&&l){rows.push(l);l=w;}else l=t;});
    rows.push(l);
    rows.forEach((r,ri)=>c.fillText(r,x,y+(li*rows.length+ri)*lineH));
  });
}

function addPattern(type){

  ctx.globalAlpha=1;saveHistory();
}

      <div class="prop-row">
        <label>Tamanho <span class="prop-val" id="sizeVal">8px</span></label>
        <input type="range" min="1" max="80" value="8" oninput="brushSize=+this.value;document.getElementById('sizeVal').textContent=this.value+'px'">
      </div>
      <div class="prop-row">
        <label>Opacidade <span class="prop-val" id="opacVal">100%</span></label>
        <input type="range" min="5" max="100" value="100" oninput="opacity=this.value/100;document.getElementById('opacVal').textContent=this.value+'%'">
      </div>
      <div class="divider"></div>
      <div class="sub-title">Fundos degradê rápidos</div>
      <div class="gradient-presets" id="rgrad"></div>`;
    const pr=document.getElementById('pal-row');
    palette.forEach(h=>{
      const s=document.createElement('div');s.className='color-swatch'+(h===currentColor?' active':'');
      s.style.background=h;s.title=h;
      s.onclick=()=>{setColor(h);document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');};
      pr.appendChild(s);
    });
    const rg=document.getElementById('rgrad');
    gradients.forEach(g=>{
      const pill=document.createElement('div');pill.className='grad-pill';
      pill.style.background=`linear-gradient(135deg,${g.stops[0]},${g.stops[1]})`;
      pill.title=g.name;pill.onclick=()=>applyGradient(g.stops);
      rg.appendChild(pill);
    });
  } else if(id==='texto'){
    body.innerHTML=`
      <div class="section-title">Conteúdo</div>
      <textarea class="text-area-input" id="txt-input" rows="4" placeholder="Digite seu texto aqui...&#10;Use Enter para nova linha"></textarea>
      <button class="add-btn" onclick="addTextFromPanel()">Adicionar ao centro</button>
      <div class="divider"></div>
      <div class="section-title">Fonte</div>
      <select class="font-select" id="font-sel" onchange="currentFont=this.value">
        ${fonts.map(f=>`<option value="${f.value}" style="font-family:${f.value}">${f.label}</option>`).join('')}
      </select>
      <div class="prop-row">
        <label>Tamanho <span class="prop-val" id="fsizeVal">48px</span></label>
        <input type="range" min="12" max="200" value="48" oninput="fontSize=+this.value;document.getElementById('fsizeVal').textContent=this.value+'px'">
      </div>
      <div class="section-title">Alinhamento</div>
      <div class="align-row">
        <button class="align-btn" onclick="textAlign='left';setActiveAlign(this)">≡ Esq</button>
        <button class="align-btn active" onclick="textAlign='center';setActiveAlign(this)">≡ Centro</button>
        <button class="align-btn" onclick="textAlign='right';setActiveAlign(this)">≡ Dir</button>
      </div>
      <div class="section-title">Estilo</div>
      <div class="style-row">
        <button class="style-btn" onclick="toggleBold(this)"><b>N</b></button>
        <button class="style-btn" onclick="toggleItalic(this)"><i>I</i></button>
        <button class="style-btn" onclick="addTextOutline()">Contorno</button>
        <button class="style-btn" onclick="addTextShadow()">Sombra</button>
      </div>`;
  } else if(id==='filtros'){
    const filterList=[{n:'Original',key:'none'},{n:'Sépia',key:'sepia'},{n:'Quente',key:'warm'},{n:'Mocha',key:'mocha'},{n:'Fade',key:'fade'},{n:'Contraste',key:'contrast'}];
    body.innerHTML=`<div class="section-title">Filtros de cor</div><div class="filter-grid" id="filter-grid"></div>
    <div class="divider"></div>
    <div class="section-title">Ajustes</div>
    <div class="prop-row"><label>Brilho <span class="prop-val" id="brtVal">0</span></label><input type="range" min="-100" max="100" value="0" oninput="document.getElementById('brtVal').textContent=this.value;applyBrightness(+this.value)"></div>`;
    const fg2=document.getElementById('filter-grid');
    filterList.forEach(f=>{
      const card=document.createElement('div');card.className='filter-card'+(f.key==='none'?' active':'');
      const mini=document.createElement('canvas');mini.width=80;mini.height=80;
      const mc=mini.getContext('2d');
      const tempData=ctx.getImageData(0,0,Math.min(canvasW,80),Math.min(canvasH,80));
      mc.putImageData(tempData,0,0);
      if(f.key!=='none')filterPreview(mc,f.key);
      const nm=document.createElement('div');nm.className='filter-name';nm.textContent=f.n;
      card.appendChild(mini);card.appendChild(nm);
      card.onclick=()=>{
        if(f.key!=='none')applyFilter(f.key);
        document.querySelectorAll('.filter-card').forEach(x=>x.classList.remove('active'));
        card.classList.add('active');
      };
      fg2.appendChild(card);
    });
  } else if(id==='camadas'){
    body.innerHTML=`<div class="section-title">Ações</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      <button class="tbtn" onclick="flipH()">↔ Virar H</button>
      <button class="tbtn" onclick="flipV()">↕ Virar V</button>
      <button class="tbtn" onclick="rotate90()">↻ Girar</button>
      <button class="tbtn" onclick="cropCanvas()">✂ Recortar</button>
    </div>
    <div class="section-title">Histórico</div>
    <div style="font-size:11px;color:var(--texts);line-height:2;">${history.map((h,i)=>`<div style="cursor:pointer;padding:4px 8px;border-radius:6px;${i===histIdx?'background:var(--card);color:var(--textm);':''}" onclick="histIdx=${i};restoreHistory()">Estado ${i+1}</div>`).join('')}</div>`;
  } else if(id==='exportar'){
    body.innerHTML=`<div class="section-title">Exportar imagem</div>
    <div class="export-grid">
      <div class="exp-card" onclick="exportPNG()"><div class="exp-icon">🖼</div><div class="exp-label">PNG</div><div class="exp-sub">Alta qualidade</div></div>
      <div class="exp-card" onclick="exportJPG()"><div class="exp-icon">📷</div><div class="exp-label">JPG</div><div class="exp-sub">Comprimido</div></div>
      <div class="exp-card" onclick="exportSVG()"><div class="exp-icon">✦</div><div class="exp-label">SVG</div><div class="exp-sub">Vetorial</div></div>
      <div class="exp-card" onclick="exportPaletteCss()"><div class="exp-icon">🎨</div><div class="exp-label">Paleta CSS</div><div class="exp-sub">Para web</div></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">Guia de fontes</div>
    <button class="add-btn" onclick="downloadFontGuide()" style="background:var(--b3);">Baixar guia de fontes</button>
    <div class="divider"></div>
    <div class="section-title">Dimensões do canvas</div>
    <div style="font-size:11px;color:var(--textm);line-height:2;">
      <div>Tamanho atual: <b>${canvasW} × ${canvasH}px</b></div>
      <div>Feed quadrado: 1080 × 1080</div>
      <div>Retrato: 1080 × 1350</div>
      <div>Story: 1080 × 1920</div>
    </div>`;
  }
}

function setColor(h){
  currentColor=h;
  const hex=document.getElementById('colorHex');
  if(hex)hex.textContent=h;
  const cc=document.getElementById('customColor');
  if(cc)cc.value=h;
}
function setActiveAlign(btn){document.querySelectorAll('.align-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function toggleBold(btn){fontWeight=fontWeight==='400'?'700':'400';btn.classList.toggle('active');}
function toggleItalic(btn){fontStyle=fontStyle==='normal'?'italic':'normal';btn.classList.toggle('active');}
function addTextOutline(){
  const txt=document.getElementById('txt-input')?.value||'Texto';
  ctx.font=`${fontStyle} ${fontWeight} ${fontSize}px ${currentFont}`;
  ctx.strokeStyle=currentColor;ctx.lineWidth=3;ctx.textAlign=textAlign;ctx.textBaseline='middle';
  ctx.strokeText(txt,canvasW/2,canvasH/2);saveHistory();
}
function addTextShadow(){
  const txt=document.getElementById('txt-input')?.value||'Texto';
  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=20;ctx.shadowOffsetX=4;ctx.shadowOffsetY=4;
  ctx.fillStyle=currentColor;ctx.font=`${fontStyle} ${fontWeight} ${fontSize}px ${currentFont}`;
  ctx.textAlign=textAlign;ctx.textBaseline='middle';ctx.fillText(txt,canvasW/2,canvasH/2);
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  saveHistory();
}
function flipH(){const tmp=document.createElement('canvas');tmp.width=canvasW;tmp.height=canvasH;const tc=tmp.getContext('2d');tc.translate(canvasW,0);tc.scale(-1,1);tc.drawImage(canvas,0,0);ctx.clearRect(0,0,canvasW,canvasH);ctx.drawImage(tmp,0,0);saveHistory();}
function flipV(){const tmp=document.createElement('canvas');tmp.width=canvasW;tmp.height=canvasH;const tc=tmp.getContext('2d');tc.translate(0,canvasH);tc.scale(1,-1);tc.drawImage(canvas,0,0);ctx.clearRect(0,0,canvasW,canvasH);ctx.drawImage(tmp,0,0);saveHistory();}
function rotate90(){const tmp=document.createElement('canvas');tmp.width=canvasH;tmp.height=canvasW;const tc=tmp.getContext('2d');tc.translate(canvasH/2,canvasW/2);tc.rotate(Math.PI/2);tc.drawImage(canvas,-canvasW/2,-canvasH/2);ctx.clearRect(0,0,canvasW,canvasH);ctx.drawImage(tmp,0,0,canvasW,canvasH);saveHistory();}
function cropCanvas(){toast('Selecione a área com o mouse (em breve)');}
function applyBrightness(v){const id=ctx.getImageData(0,0,canvasW,canvasH);const d=id.data;for(let i=0;i<d.length;i+=4){d[i]=Math.min(255,Math.max(0,d[i]+v));d[i+1]=Math.min(255,Math.max(0,d[i+1]+v));d[i+2]=Math.min(255,Math.max(0,d[i+2]+v));}ctx.putImageData(id,0,0);}

function downloadFontGuide(){
  const txt=`Guia de Fontes — Studio Psi\n${'='.repeat(40)}\n\n${fonts.map(f=>`• ${f.label}\n  Uso ideal: títulos, citações, textos principais\n  CSS: font-family: ${f.value};\n  Google Fonts: https://fonts.google.com/?query=${f.label.split(' ').join('+')}\n`).join('\n')}\n\nPara instalar no Canva:\n1. Baixe a fonte no Google Fonts\n2. No Canva, vá em "Enviar uma fonte"\n3. Selecione o arquivo .ttf ou .otf\n`;
  const b=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.download='guia-fontes-studio-psi.txt';a.href=URL.createObjectURL(b);a.click();
  toast('Guia de fontes baixado');
}

initCanvas();
</script>
</body>
</html>
